{% load static %}

<img src="/static/js/favicon.ico" alt="Owl Icon">

{%if latest_question_list.length%}
<u1>
    {% for question in latest_question_list %}
    <li>
        <a href="/{{question.id}}/"> {{question.question_text}} </a>
    </li>

    {% endfor %}
</u1>
{% else %}
<p>No more questions today.</p>
{% endif %}
